<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="60" cy="20" r="8"/>
  <!-- Torso -->
  <line x1="60" y1="28" x2="60" y2="62"/>
  <!-- Right arm curling (hammer grip - vertical dumbbell) -->
  <line x1="60" y1="40" x2="74" y2="42"/>
  <line x1="74" y1="42" x2="76" y2="32"/>
  <!-- Vertical dumbbell right -->
  <rect x="73" y="24" width="6" height="14" rx="2"/>
  <!-- Left arm down -->
  <line x1="60" y1="40" x2="44" y2="56"/>
  <!-- Vertical dumbbell left (down) -->
  <rect x="41" y="54" width="6" height="14" rx="2"/>
  <!-- Legs -->
  <line x1="60" y1="62" x2="48" y2="100"/>
  <line x1="60" y1="62" x2="72" y2="100"/>
</svg>
