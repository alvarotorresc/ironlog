<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pull-up bar -->
  <line x1="20" y1="16" x2="100" y2="16"/>
  <line x1="20" y1="16" x2="20" y2="28"/>
  <line x1="100" y1="16" x2="100" y2="28"/>
  <!-- Head -->
  <circle cx="60" cy="32" r="8"/>
  <!-- Torso -->
  <line x1="60" y1="40" x2="60" y2="72"/>
  <!-- Arms gripping bar -->
  <line x1="60" y1="44" x2="40" y2="20"/>
  <line x1="60" y1="44" x2="80" y2="20"/>
  <!-- Legs hanging -->
  <line x1="60" y1="72" x2="52" y2="100"/>
  <line x1="60" y1="72" x2="68" y2="100"/>
</svg>
