<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="60" cy="22" r="8"/>
  <!-- Torso -->
  <line x1="60" y1="30" x2="60" y2="64"/>
  <!-- Arms raised forward -->
  <line x1="60" y1="40" x2="40" y2="28"/>
  <line x1="60" y1="40" x2="52" y2="60"/>
  <!-- Dumbbell raised -->
  <rect x="34" y="24" width="10" height="6" rx="2"/>
  <!-- Dumbbell down -->
  <rect x="48" y="58" width="10" height="6" rx="2"/>
  <!-- Legs -->
  <line x1="60" y1="64" x2="48" y2="100"/>
  <line x1="60" y1="64" x2="72" y2="100"/>
  <!-- Arrow showing forward raise -->
  <path d="M 40 60 A 20 20 0 0 1 36 32" stroke-dasharray="4 3"/>
</svg>
