  <rect x="30" y="60" width="8" height="12" rx="2"/>
  <rect x="68" y="60" width="8" height="12" rx="2"/>
  <!-- Legs -->
  <line x1="75" y1="55" x2="68" y2="80"/>
  <line x1="68" y1="80" x2="65" y2="100"/>
  <line x1="75" y1="55" x2="82" y2="80"/>
  <line x1="82" y1="80" x2="84" y2="100"/>
</svg>
