<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Seat/backrest angled -->
  <line x1="25" y1="50" x2="50" y2="80"/>
  <line x1="50" y1="80" x2="50" y2="90"/>
  <!-- Head -->
  <circle cx="32" cy="42" r="8"/>
  <!-- Torso on seat -->
  <line x1="36" y1="48" x2="50" y2="70"/>
  <!-- Arms by sides -->
  <line x1="42" y1="56" x2="36" y2="72"/>
  <!-- Legs pushing platform -->
  <line x1="50" y1="70" x2="72" y2="54"/>
  <line x1="72" y1="54" x2="88" y2="40"/>
  <!-- Platform -->
  <rect x="82" y="30" width="6" height="30" rx="2"/>
  <!-- Machine rails -->
  <line x1="85" y1="28" x2="100" y2="16"/>
  <line x1="85" y1="62" x2="100" y2="76"/>
</svg>
