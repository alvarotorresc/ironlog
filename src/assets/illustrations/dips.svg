<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Parallel bars -->
  <line x1="30" y1="40" x2="30" y2="100"/>
  <line x1="90" y1="40" x2="90" y2="100"/>
  <line x1="25" y1="40" x2="45" y2="40"/>
  <line x1="75" y1="40" x2="95" y2="40"/>
  <!-- Head -->
  <circle cx="60" cy="22" r="8"/>
  <!-- Torso -->
  <line x1="60" y1="30" x2="60" y2="62"/>
  <!-- Arms on bars (pushing up) -->
  <line x1="60" y1="38" x2="38" y2="38"/>
  <line x1="60" y1="38" x2="82" y2="38"/>
  <!-- Legs hanging, crossed -->
  <line x1="60" y1="62" x2="54" y2="90"/>
  <line x1="60" y1="62" x2="66" y2="86"/>
  <line x1="66" y1="86" x2="58" y2="96"/>
</svg>
