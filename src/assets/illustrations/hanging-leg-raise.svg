<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bar at top -->
  <line x1="20" y1="14" x2="100" y2="14"/>
  <!-- Arms hanging from bar -->
  <line x1="48" y1="14" x2="48" y2="30"/>
  <line x1="72" y1="14" x2="72" y2="30"/>
  <!-- Head -->
  <circle cx="60" cy="34" r="8"/>
  <!-- Torso -->
  <line x1="60" y1="42" x2="60" y2="64"/>
  <!-- Arms up to bar -->
  <line x1="60" y1="42" x2="48" y2="30"/>
  <line x1="60" y1="42" x2="72" y2="30"/>
  <!-- Legs raised forward (L-sit) -->
  <line x1="60" y1="64" x2="44" y2="72"/>
  <line x1="44" y1="72" x2="36" y2="70"/>
  <line x1="60" y1="64" x2="48" y2="76"/>
  <line x1="48" y1="76" x2="40" y2="74"/>
</svg>
