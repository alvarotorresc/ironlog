<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="60" cy="20" r="8"/>
  <!-- Torso bending forward -->
  <line x1="60" y1="28" x2="60" y2="52"/>
  <line x1="60" y1="52" x2="44" y2="72"/>
  <!-- Arms reaching to toes -->
  <line x1="54" y1="42" x2="38" y2="80"/>
  <line x1="54" y1="42" x2="42" y2="76"/>
  <!-- Legs spread (straddle stretch) -->
  <line x1="60" y1="52" x2="32" y2="86"/>
  <line x1="32" y1="86" x2="28" y2="92"/>
  <line x1="60" y1="52" x2="88" y2="86"/>
  <line x1="88" y1="86" x2="92" y2="92"/>
  <!-- Ground -->
  <line x1="18" y1="92" x2="104" y2="92"/>
</svg>
