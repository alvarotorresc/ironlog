<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Machine seat -->
  <rect x="30" y="50" width="30" height="6" rx="2"/>
  <line x1="30" y1="56" x2="30" y2="100"/>
  <!-- Backrest -->
  <line x1="30" y1="50" x2="30" y2="30"/>
  <!-- Head -->
  <circle cx="42" cy="24" r="8"/>
  <!-- Torso seated -->
  <line x1="42" y1="32" x2="50" y2="50"/>
  <!-- Arms on grips -->
  <line x1="46" y1="40" x2="34" y2="44"/>
  <!-- Leg extended forward -->
  <line x1="50" y1="56" x2="80" y2="50"/>
  <line x1="80" y1="50" x2="90" y2="48"/>
  <!-- Ankle pad -->
  <circle cx="90" cy="48" r="4"/>
  <!-- Other leg down -->
  <line x1="50" y1="56" x2="52" y2="76"/>
  <line x1="52" y1="76" x2="52" y2="90"/>
  <!-- Machine lever -->
  <line x1="60" y1="56" x2="60" y2="90"/>
</svg>
