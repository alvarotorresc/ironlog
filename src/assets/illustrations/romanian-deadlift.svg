<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="38" cy="28" r="8"/>
  <!-- Torso bent forward at hips -->
  <line x1="42" y1="34" x2="72" y2="48"/>
  <!-- Arms hanging down -->
  <line x1="52" y1="40" x2="48" y2="66"/>
  <line x1="60" y1="44" x2="56" y2="66"/>
  <!-- Barbell -->
  <line x1="36" y1="70" x2="68" y2="70"/>
  <rect x="30" y="64" width="8" height="12" rx="2"/>
  <rect x="66" y="64" width="8" height="12" rx="2"/>
  <!-- Legs straight -->
  <line x1="72" y1="48" x2="66" y2="82"/>
  <line x1="66" y1="82" x2="64" y2="100"/>
  <line x1="72" y1="48" x2="80" y2="82"/>
  <line x1="80" y1="82" x2="82" y2="100"/>
</svg>
