<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bench (lying face down) -->
  <rect x="20" y="52" width="70" height="6" rx="2"/>
  <line x1="25" y1="58" x2="25" y2="100"/>
  <line x1="85" y1="58" x2="85" y2="100"/>
  <!-- Head facing down -->
  <circle cx="30" cy="44" r="8"/>
  <!-- Torso lying -->
  <line x1="38" y1="46" x2="75" y2="52"/>
  <!-- Arms holding bench -->
  <line x1="34" y1="48" x2="28" y2="58"/>
  <!-- Legs curling up -->
  <line x1="75" y1="52" x2="90" y2="50"/>
  <line x1="90" y1="50" x2="86" y2="30"/>
  <!-- Ankle pad -->
  <circle cx="86" cy="28" r="4"/>
  <!-- Machine lever -->
  <line x1="85" y1="58" x2="90" y2="50"/>
</svg>
