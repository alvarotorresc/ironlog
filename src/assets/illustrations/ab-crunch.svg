<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Ground -->
  <line x1="16" y1="82" x2="104" y2="82"/>
  <!-- Head (raised up in crunch) -->
  <circle cx="42" cy="50" r="8"/>
  <!-- Upper body crunching up -->
  <line x1="48" y1="55" x2="65" y2="72"/>
  <!-- Lower body on ground -->
  <line x1="65" y1="72" x2="65" y2="82"/>
  <!-- Arms behind head -->
  <line x1="42" y1="46" x2="34" y2="42"/>
  <line x1="42" y1="46" x2="50" y2="42"/>
  <!-- Legs bent, feet on ground -->
  <line x1="65" y1="82" x2="80" y2="66"/>
  <line x1="80" y1="66" x2="88" y2="82"/>
  <line x1="65" y1="82" x2="76" y2="68"/>
  <line x1="76" y1="68" x2="82" y2="82"/>
</svg>
