  <rect x="24" y="76" width="8" height="12" rx="2"/>
  <rect x="88" y="76" width="8" height="12" rx="2"/>
  <!-- Legs bent -->
  <line x1="60" y1="62" x2="48" y2="82"/>
  <line x1="48" y1="82" x2="46" y2="100"/>
  <line x1="60" y1="62" x2="72" y2="82"/>
  <line x1="72" y1="82" x2="74" y2="100"/>
</svg>
