<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Head -->
  <circle cx="60" cy="18" r="8"/>
  <!-- Torso upright -->
  <line x1="60" y1="26" x2="60" y2="58"/>
  <!-- Arms by sides -->
  <line x1="60" y1="36" x2="48" y2="54"/>
  <line x1="60" y1="36" x2="72" y2="54"/>
  <!-- Front leg lunging -->
  <line x1="60" y1="58" x2="40" y2="78"/>
  <line x1="40" y1="78" x2="36" y2="100"/>
  <!-- Back leg extended -->
  <line x1="60" y1="58" x2="82" y2="78"/>
  <line x1="82" y1="78" x2="92" y2="94"/>
  <!-- Front foot -->
  <line x1="32" y1="100" x2="42" y2="100"/>
  <!-- Back knee near ground -->
  <line x1="88" y1="94" x2="96" y2="94"/>
</svg>
