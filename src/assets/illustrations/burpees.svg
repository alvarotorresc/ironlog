<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Phase 1: Jump up (top half) -->
  <!-- Head -->
  <circle cx="36" cy="16" r="6"/>
  <!-- Arms raised -->
  <line x1="36" y1="22" x2="36" y2="36"/>
  <line x1="36" y1="26" x2="26" y2="16"/>
  <line x1="36" y1="26" x2="46" y2="16"/>
  <!-- Legs tucked -->
  <line x1="36" y1="36" x2="30" y2="48"/>
  <line x1="36" y1="36" x2="42" y2="48"/>

  <!-- Phase 2: Push-up position (bottom half) -->
  <!-- Head -->
  <circle cx="30" cy="72" r="6"/>
  <!-- Body in push-up -->
  <line x1="36" y1="74" x2="90" y2="82"/>
  <!-- Arms -->
  <line x1="36" y1="78" x2="34" y2="92"/>
  <line x1="30" y1="92" x2="38" y2="92"/>
  <!-- Legs -->
  <line x1="90" y1="82" x2="96" y2="92"/>
  <line x1="92" y1="92" x2="100" y2="92"/>
  <!-- Ground -->
  <line x1="20" y1="92" x2="106" y2="92"/>
  <!-- Arrow showing movement -->
  <path d="M 60 52 L 60 62" stroke-dasharray="3 3"/>
  <polyline points="56,58 60,62 64,58"/>
</svg>
