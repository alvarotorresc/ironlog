<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bench -->
  <rect x="25" y="68" width="70" height="6" rx="2"/>
  <line x1="30" y1="74" x2="30" y2="100"/>
  <line x1="90" y1="74" x2="90" y2="100"/>
  <!-- Person lying on bench -->
  <circle cx="40" cy="52" r="8"/>
  <line x1="48" y1="54" x2="80" y2="68"/>
  <!-- Arms lowering barbell behind head -->
  <line x1="48" y1="56" x2="42" y2="48"/>
  <line x1="42" y1="48" x2="30" y2="44"/>
  <!-- Barbell near head -->
  <line x1="22" y1="44" x2="38" y2="44"/>
  <rect x="18" y="38" width="6" height="12" rx="2"/>
  <rect x="36" y="38" width="6" height="12" rx="2"/>
  <!-- Legs -->
  <line x1="80" y1="68" x2="84" y2="86"/>
  <line x1="84" y1="86" x2="86" y2="100"/>
</svg>
